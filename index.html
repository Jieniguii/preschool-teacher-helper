<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幼师助手 — 观察记录 & 期末报告生成器</title>
<style>
:root {
  --bg: #fdf6ee;
  --card: #ffffff;
  --primary: #c88b5d;
  --primary-light: #f5e6d8;
  --green: #7a9e7e;
  --green-light: #e8f0ea;
  --text: #3a3a3a;
  --text-light: #8a8a8a;
  --border: #e8ddd0;
  --danger: #d4756b;
  --danger-light: #fce8e6;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}
.container { max-width: 820px; margin:0 auto; padding: 24px 20px 60px; }

/* Header */
.header {
  text-align: center;
  padding: 32px 0 20px;
}
.header h1 {
  font-size: 2rem;
  color: var(--primary);
  font-weight: 700;
  letter-spacing: 1px;
}
.header .subtitle {
  color: var(--text-light);
  font-size: 0.95rem;
  margin-top: 6px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 6px;
  box-shadow: var(--shadow);
}
.tab-btn {
  flex: 1;
  padding: 12px 16px;
  border: none;
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-light);
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--primary); }
.tab-btn.active {
  background: var(--primary);
  color: #fff;
}

/* Card */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.card-title {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 20px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .icon { font-size: 1.3rem; }

/* Form */
.form-group {
  margin-bottom: 18px;
}
.form-group label {
  display: block;
  font-size: 0.9rem;
  font-weight: 500;
  margin-bottom: 6px;
  color: var(--text);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-row.three {
  grid-template-columns: 1fr 1fr 1fr;
}
input[type="text"],
input[type="date"],
select,
textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 0.95rem;
  font-family: inherit;
  color: var(--text);
  background: #fefdfb;
  transition: border-color 0.2s;
  outline: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--primary);
}
textarea {
  resize: vertical;
  min-height: 100px;
  line-height: 1.6;
}

/* Checkbox group */
.checkbox-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.2s;
  user-select: none;
}
.checkbox-item:hover {
  border-color: var(--green);
}
.checkbox-item.checked {
  background: var(--green-light);
  border-color: var(--green);
  color: #3a3a3a;
}
.checkbox-item input { display: none; }

/* Scene tags */
.scene-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.scene-tag {
  padding: 8px 16px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.2s;
  user-select: none;
}
.scene-tag:hover { border-color: var(--primary); }
.scene-tag.selected {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--primary);
  font-weight: 500;
}

/* Buttons */
.btn {
  padding: 11px 24px;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover { background: #b87a4e; }
.btn-green {
  background: var(--green);
  color: #fff;
}
.btn-green:hover { background: #6b8e6e; }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 7px 14px; font-size: 0.85rem; }
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

/* Result */
.result-box {
  background: #fefdfb;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  min-height: 120px;
  line-height: 1.8;
  font-size: 0.95rem;
  white-space: pre-wrap;
  word-break: break-word;
}
.result-box.empty {
  color: var(--text-light);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.result-box h2,
.result-box h3 {
  color: var(--primary);
  margin: 16px 0 8px;
}
.result-box h2:first-child,
.result-box h3:first-child { margin-top: 0; }
.result-box h2 { font-size: 1.15rem; }
.result-box h3 { font-size: 1.05rem; }
.result-box .highlight { color: var(--green); font-weight: 500; }
.result-box hr { border: none; border-top: 1px dashed var(--border); margin: 16px 0; }

/* History */
.history-item {
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.history-item .meta {
  flex: 1;
  min-width: 0;
}
.history-item .name {
  font-weight: 600;
  font-size: 0.95rem;
}
.history-item .info {
  color: var(--text-light);
  font-size: 0.85rem;
  margin-top: 2px;
}
.history-item .preview {
  color: var(--text);
  font-size: 0.88rem;
  margin-top: 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}
.history-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.empty-state {
  text-align: center;
  color: var(--text-light);
  padding: 40px 20px;
}
.empty-state .icon { font-size: 3rem; display: block; margin-bottom: 12px; }

/* Notice */
.notice {
  background: var(--green-light);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 0.88rem;
  color: #5a7a5e;
  margin-bottom: 16px;
  line-height: 1.6;
}

/* Saved observations for report */
.saved-select {
  max-height: 200px;
  overflow-y: auto;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px;
}
.saved-select-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
}
.saved-select-item:hover { background: var(--bg); }
.saved-select-item input { margin: 0; }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--green);
  color: #fff;
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 0.9rem;
  z-index: 1000;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; } }

/* Footer */
.footer {
  text-align: center;
  color: var(--text-light);
  font-size: 0.82rem;
  padding-top: 20px;
}

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 16px 12px 40px; }
  .card { padding: 20px 16px; }
  .form-row, .form-row.three { grid-template-columns: 1fr; }
  .header h1 { font-size: 1.5rem; }
  .tabs { gap: 4px; }
  .tab-btn { padding: 10px 8px; font-size: 0.85rem; }
  .btn-group { flex-direction: column; }
  .btn-group .btn { justify-content: center; }
}
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🦞 幼师助手</h1>
    <p class="subtitle">观察记录 · 期末评估报告 — 专业生成器</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('observation')">📝 观察记录</button>
    <button class="tab-btn" onclick="switchTab('report')">📊 期末报告</button>
    <button class="tab-btn" onclick="switchTab('history')">📂 历史记录</button>
  </div>

  <!-- ==================== 观察记录 ==================== -->
  <div id="tab-observation" class="tab-content">

    <div class="card">
      <div class="card-title"><span class="icon">📝</span> 填写观察信息</div>

      <div class="form-row three">
        <div class="form-group">
          <label>孩子姓名</label>
          <input type="text" id="obs-name" placeholder="如：小明">
        </div>
        <div class="form-group">
          <label>年龄</label>
          <select id="obs-age">
            <option value="">请选择</option>
            <option value="3-4">3-4岁（小班）</option>
            <option value="4-5">4-5岁（中班）</option>
            <option value="5-6">5-6岁（大班）</option>
          </select>
        </div>
        <div class="form-group">
          <label>观察日期</label>
          <input type="date" id="obs-date">
        </div>
      </div>

      <div class="form-group">
        <label>观察场景</label>
        <div class="scene-tags" id="obs-scene">
          <span class="scene-tag" data-scene="区角活动">区角活动</span>
          <span class="scene-tag" data-scene="户外活动">户外活动</span>
          <span class="scene-tag" data-scene="集体教学活动">集体教学</span>
          <span class="scene-tag" data-scene="自由游戏">自由游戏</span>
          <span class="scene-tag" data-scene="生活环节">生活环节</span>
          <span class="scene-tag" data-scene="同伴交往">同伴交往</span>
          <span class="scene-tag" data-scene="艺术创作">艺术创作</span>
          <span class="scene-tag" data-scene="其他">其他</span>
        </div>
      </div>

      <div class="form-group">
        <label>发生了什么？（用口语简单记就行）</label>
        <textarea id="obs-what" placeholder="例：今天区域游戏时，小明选了建构区，用积木搭了一座桥。搭到一半桥倒了，他没有放弃，重新开始尝试，最后成功了。他还主动邀请旁边的小红来看他的桥。"></textarea>
      </div>

      <div class="form-group">
        <label>孩子的语言 / 行为细节（可选，有印象就写）</label>
        <textarea id="obs-detail" placeholder="例：他说"你看我的桥，上面还能走车"。搭桥失败时皱着眉头，但没有哭，自己说"再来一次"。"></textarea>
      </div>

      <button class="btn btn-primary" onclick="generateObservation()" style="width:100%;justify-content:center;padding:13px;">
        ✨ 生成观察记录
      </button>
    </div>

    <!-- Result -->
    <div class="card" id="obs-result-card">
      <div class="card-title"><span class="icon">📄</span> 生成结果</div>
      <div class="result-box empty" id="obs-result">点击上方按钮生成观察记录</div>
      <div class="btn-group" id="obs-result-actions" style="display:none;">
        <button class="btn btn-green" onclick="copyResult('obs-result')">📋 一键复制</button>
        <button class="btn btn-outline" onclick="saveCurrentObsRecord()">💾 保存到历史</button>
        <button class="btn btn-outline btn-sm" onclick="downloadResult('obs-result', '观察记录')">📥 下载Word</button>
      </div>
    </div>
  </div>

  <!-- ==================== 期末报告 ==================== -->
  <div id="tab-report" class="tab-content" style="display:none;">

    <div class="card">
      <div class="card-title"><span class="icon">📊</span> 填写报告信息</div>

      <div class="form-row three">
        <div class="form-group">
          <label>孩子姓名</label>
          <input type="text" id="rpt-name" placeholder="如：小明">
        </div>
        <div class="form-group">
          <label>年龄</label>
          <select id="rpt-age">
            <option value="">请选择</option>
            <option value="3-4">3-4岁（小班）</option>
            <option value="4-5">4-5岁（中班）</option>
            <option value="5-6">5-6岁（大班）</option>
          </select>
        </div>
        <div class="form-group">
          <label>学期</label>
          <select id="rpt-semester">
            <option value="上学期">上学期</option>
            <option value="下学期">下学期</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>本学期重要观察片段（可选多条，每条一段）</label>
        <textarea id="rpt-observations" rows="6" placeholder="支持两种方式：

方式1——从历史记录导入：右侧点击"从历史导入"
方式2——手动输入：一段一条，讲清楚什么场景下孩子做了什么，展现了什么

例：
1. 建构区搭积木时，小明尝试了3次才成功搭好桥，过程中没有放弃，还主动帮助同伴搬运积木。
2. 语言活动中，小明能完整复述故事的主要情节，并能表达自己对故事角色的看法。
3. 户外攀爬时，小明从不敢爬高到第3周能独立完成攀爬架全程，进步明显。"></textarea>
      </div>

      <div class="form-group">
        <label>重点关注领域（多选）</label>
        <div class="checkbox-group" id="rpt-domains">
          <label class="checkbox-item"><input type="checkbox" value="健康"> 健康</label>
          <label class="checkbox-item"><input type="checkbox" value="语言"> 语言</label>
          <label class="checkbox-item"><input type="checkbox" value="社会"> 社会</label>
          <label class="checkbox-item"><input type="checkbox" value="科学"> 科学</label>
          <label class="checkbox-item"><input type="checkbox" value="艺术"> 艺术</label>
        </div>
      </div>

      <div class="form-group">
        <label>家长特别关注（可选）</label>
        <input type="text" id="rpt-parent-concern" placeholder="如：孩子太内向不爱说话 / 吃饭挑食 / 注意力不集中">
      </div>

      <button class="btn btn-primary" onclick="generateReport()" style="width:100%;justify-content:center;padding:13px;">
        ✨ 生成期末评估报告
      </button>
    </div>

    <!-- Result -->
    <div class="card" id="rpt-result-card">
      <div class="card-title"><span class="icon">📄</span> 生成结果</div>
      <div class="result-box empty" id="rpt-result">点击上方按钮生成期末报告</div>
      <div class="btn-group" id="rpt-result-actions" style="display:none;">
        <button class="btn btn-green" onclick="copyResult('rpt-result')">📋 一键复制</button>
        <button class="btn btn-outline" onclick="downloadResult('rpt-result', '期末评估报告')">📥 下载Word</button>
      </div>
    </div>
  </div>

  <!-- ==================== 历史记录 ==================== -->
  <div id="tab-history" class="tab-content" style="display:none;">
    <div class="card">
      <div class="card-title"><span class="icon">📂</span> 已保存的观察记录</div>
      <div class="notice">
        💡 保存的记录存储在 <code>data/records/</code> 文件夹中，每个孩子一条 .json 文件。复制整个 data 文件夹即可备份。
      </div>
      <div id="history-list">
        <div class="empty-state">
          <span class="icon">📭</span>
          <p>还没有保存过记录</p>
          <p style="font-size:0.85rem;">生成观察记录后点击"保存到历史"即可</p>
        </div>
      </div>
      <div class="btn-group" id="history-actions" style="display:none;">
        <button class="btn btn-outline btn-sm" onclick="clearHistory()">🗑 清空全部</button>
      </div>
    </div>
  </div>

  <div class="footer">🦞 幼师助手 · 让专业记录不再耗时</div>
</div>

<!-- Toast -->
<div id="toast" class="toast" style="display:none;"></div>

<script>
// ============================================================
// Tab 切换
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).style.display = 'block';
  if (tab === 'history') renderHistory();
}

// ============================================================
// UI 交互
// ============================================================
// 场景选择
document.getElementById('obs-scene').addEventListener('click', function(e) {
  if (e.target.classList.contains('scene-tag')) {
    this.querySelectorAll('.scene-tag').forEach(t => t.classList.remove('selected'));
    e.target.classList.add('selected');
  }
});

// Checkbox 样式
document.querySelectorAll('.checkbox-item').forEach(item => {
  item.addEventListener('click', function() {
    const cb = this.querySelector('input');
    cb.checked = !cb.checked;
    this.classList.toggle('checked', cb.checked);
  });
});

// 默认日期
document.getElementById('obs-date').value = new Date().toISOString().split('T')[0];

// ============================================================
// Toast
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  // Re-trigger animation
  t.style.animation = 'none';
  void t.offsetWidth;
  t.style.animation = '';
  setTimeout(() => t.style.display = 'none', 2000);
}

// ============================================================
// 数据存储（通过本地 API 存到 data/records/ 文件夹）
// ============================================================
async function getRecords() {
  try {
    const res = await fetch('/api/records');
    if (!res.ok) throw new Error('请求失败');
    return await res.json();
  } catch(e) {
    console.error('读取记录失败:', e);
    return [];
  }
}

async function saveRecord(record) {
  try {
    const res = await fetch('/api/records', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ...record,
        id: Date.now(),
        savedAt: new Date().toISOString()
      })
    });
    return await res.json();
  } catch(e) {
    console.error('保存记录失败:', e);
    showToast('保存失败，请确认服务已启动');
    return { ok: false };
  }
}

async function deleteRecord(id) {
  try {
    await fetch(`/api/records/${id}`, { method: 'DELETE' });
  } catch(e) {
    console.error('删除记录失败:', e);
  }
}

async function clearHistory() {
  if (confirm('确定要清空全部历史记录？此操作不可恢复。')) {
    try {
      await fetch('/api/records', { method: 'DELETE' });
    } catch(e) {
      console.error('清空记录失败:', e);
    }
    renderHistory();
    showToast('已清空全部记录');
  }
}

// ============================================================
// 观察记录生成 — 智能引擎 v2
// ============================================================
function generateObservation() {
  const name = document.getElementById('obs-name').value.trim();
  const age = document.getElementById('obs-age').value;
  const date = document.getElementById('obs-date').value;
  const sceneEl = document.querySelector('#obs-scene .scene-tag.selected');
  const scene = sceneEl ? sceneEl.dataset.scene : '';
  const what = document.getElementById('obs-what').value.trim();
  const detail = document.getElementById('obs-detail').value.trim();

  if (!name) { showToast('请填写孩子姓名'); return; }
  if (!age) { showToast('请选择年龄'); return; }
  if (!scene) { showToast('请选择观察场景'); return; }
  if (!what) { showToast('请填写"发生了什么"'); return; }

  const result = buildObservationRecord({ name, age, date, scene, what, detail });
  document.getElementById('obs-result').innerHTML = result;
  document.getElementById('obs-result').classList.remove('empty');
  document.getElementById('obs-result-actions').style.display = 'flex';
  document.getElementById('obs-result-card').scrollIntoView({ behavior: 'smooth' });
}

// ---- 核心：关键词检测引擎 ----
function detectKeywords(text) {
  const combined = (text || '').toLowerCase();
  const found = [];
  for (const [cat, kws] of Object.entries(KEYWORD_MAP)) {
    for (const kw of kws) {
      if (combined.includes(kw)) { found.push(cat); break; }
    }
  }
  return [...new Set(found)];
}

// ---- 智能文本润色 ----
function smartPolish(text, name) {
  let t = text.trim();
  // 去掉句首的口水词
  t = t.replace(/^我觉得[，,]?\s*/g, '').replace(/^我感觉[，,]?\s*/g, '');
  t = t.replace(/^就是[，,]?\s*/g, '').replace(/^然后[，,]?\s*/g, '');
  // 去掉评价性结尾
  t = t.replace(/[，,]\s*表现得很好[。.]?$/g, '。').replace(/[，,]\s*很棒[。.]?$/g, '');
  t = t.replace(/[，,]\s*非常听话[。.]?$/g, '');
  // 替换过度主观的表述
  t = t.replace(/表现很好/g, '顺利完成').replace(/表现很棒/g, '出色完成');
  t = t.replace(/很乖/g, '主动配合').replace(/听话/g, '遵循指令');
  // 替换过度夸张
  t = t.replace(/超级/g, '非常').replace(/巨/g, '很');
  // 将"然后"串联改为"；"连接
  t = t.replace(/[，,]?\s*然后[，,]?\s*/g, '；');
  // 把"他"换成名字（如果文本中有泛指"他"）
  if (name) { t = t.replace(/^他/g, name).replace(/([。；])\s*他/g, '$1' + name); }
  // 保证以句号结尾
  if (!/[。！？]$/.test(t)) t += '。';
  return t;
}

function smartPolishDetail(detail, name) {
  if (!detail) return '';
  let t = detail.trim();
  // 去掉口语化引述标记
  t = t.replace(/他说[：:]/g, '在活动中表述：');
  t = t.replace(/他说/g, '其表达');
  // 引号标准化
  t = t.replace(/[""]/g, '\u201c').replace(/[""]/g, '\u201d');
  if (!/[。！？]$/.test(t)) t += '。';
  if (name && t.startsWith('他')) t = name + t.slice(1);
  return t;
}

// ---- 多套话术变异引擎 ----
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getSceneTemplates(scene, keywords, age) {
  const ageIdx = age === '5-6' ? 2 : age === '4-5' ? 1 : 0;
  const lib = SCENE_TEMPLATE_LIB[scene] || SCENE_TEMPLATE_LIB['其他'];
  const domain = lib.domain;

  // 根据关键词选择最匹配的分析模板
  let analysis = pick(lib.analysis);
  for (const k of keywords) {
    if (lib.analysisTagged[k]) { analysis = pick(lib.analysisTagged[k]); break; }
  }

  // 选择最匹配的建议
  let suggestion = pick(lib.suggestions);
  for (const k of keywords) {
    if (lib.suggestionsTagged[k]) { suggestion = pick(lib.suggestionsTagged[k]); break; }
  }

  return { domain, analysis, suggestion, ageGuide: AGE_GUIDE[domain]?.[ageIdx] || AGE_GUIDE['综合发展'][ageIdx] };
}

function buildObservationRecord(data) {
  const { name, age, date, scene, what, detail } = data;
  const ageGroup = ageLabels[age] || age;
  const allText = what + ' ' + (detail || '');
  const keywords = detectKeywords(allText);
  const tpl = getSceneTemplates(scene, keywords, age);
  const polishedWhat = smartPolish(what, name);
  const polishedDetail = smartPolishDetail(detail, name);

  const parts = [];
  parts.push(`<h2>🖊 幼儿观察记录</h2><hr>`);
  parts.push(`<strong>观察对象：</strong>${name}　|　<strong>年龄段：</strong>${ageGroup}　|　<strong>日期：</strong>${date}`);
  parts.push(`<strong>观察场景：</strong>${scene}<br>`);

  // 一、客观描述
  parts.push(`<h3>一、客观描述</h3>`);
  parts.push(`<p>在${date}的${scene}中，${polishedWhat}</p>`);
  if (polishedDetail) { parts.push(`<p>${polishedDetail}</p>`); }

  // 二、行为分析
  parts.push(`<h3>二、行为分析</h3>`);
  parts.push(`<p>${tpl.analysis}</p>`);

  // 三、发展解读
  parts.push(`<h3>三、发展解读</h3>`);
  parts.push(`<p>根据《3-6岁儿童学习与发展指南》，${ageGroup}幼儿在${tpl.domain}方面的发展特征为：${tpl.ageGuide}</p>`);
  // 基于关键词的补充解读
  const extraInsight = buildExtraInsight(keywords, name, age);
  if (extraInsight) { parts.push(`<p>${extraInsight}</p>`); }

  // 四、支持建议
  parts.push(`<h3>四、教育支持建议</h3>`);
  parts.push(`<p>${tpl.suggestion}</p>`);

  // 分析人留空
  parts.push(`<hr><span style="color:#8a8a8a;">记录教师：__________　审核：__________</span>`);
  return parts.join('\n');
}

function buildExtraInsight(keywords, name, age) {
  const insights = [];
  if (keywords.includes('persistence') && !keywords.includes('emotion_negative')) {
    insights.push(`${name}面对困难不轻易退缩的表现，是其学习品质中尤为可贵的部分，建议在日常中持续观察和肯定这一品质。`);
  }
  if (keywords.includes('emotion_negative')) {
    insights.push(`本次观察中${name}出现了情绪波动。在${ageLabels[age] || '该'}年龄段，幼儿的情绪调节能力仍在发展中，教师可通过共情和引导帮助其逐步学会用语言表达内心感受。`);
  }
  if (keywords.includes('social_positive') && keywords.includes('achievement')) {
    insights.push(`${name}在取得成果后主动寻求社交互动，这一行为模式表明其正在将个人成就与社交分享建立积极关联，是健康的自我效能感发展路径。`);
  }
  if (keywords.includes('curiosity')) {
    insights.push(`值得注意的是，${name}表现出了较强的探究意识。这种主动发问和观察的行为，是科学素养的早期萌芽，值得在日常活动中持续保护与支持。`);
  }
  if (keywords.includes('conflict')) {
    insights.push(`同伴交往中的冲突是幼儿学习社交技能的天然课堂。${name}在本次冲突中的处理方式，为我们了解其当前社交策略提供了重要线索。`);
  }
  if (keywords.includes('creativity') && keywords.includes('concentration')) {
    insights.push(`${name}在自我主导的创造性活动中，专注度和创造力水平均达到了较高状态，这提示我们：为幼儿提供自主选择和操作的空间，是激发其学习潜能的有效方式。`);
  }
  return insights.length > 0 ? insights[Math.floor(Math.random() * insights.length)] : '';
}

async function saveCurrentObsRecord() {

    showToast('请先生成观察记录'); return;
  }

  const name = document.getElementById('obs-name').value.trim();
  const date = document.getElementById('obs-date').value;

function generateReport() {
  const name = document.getElementById('rpt-name').value.trim();
  const age = document.getElementById('rpt-age').value;
  const semester = document.getElementById('rpt-semester').value;
  const observations = document.getElementById('rpt-observations').value.trim();
  const domains = Array.from(document.querySelectorAll('#rpt-domains input:checked')).map(cb => cb.value);
  const parentConcern = document.getElementById('rpt-parent-concern').value.trim();
  const year = new Date().getFullYear();

  if (!name) { showToast('请填写孩子姓名'); return; }
  if (!age) { showToast('请选择年龄'); return; }
  if (!observations) { showToast('请填写本学期观察片段'); return; }

  // 解析观察片段
  const obsItems = parseObservations(observations);
  const allDomains = domains.length > 0 ? domains : ['健康', '语言', '社会', '科学', '艺术'];

  const result = buildFinalReport({
    name, age, semester, obsItems, domains: allDomains,
    parentConcern, year, ageLabel: ageLabels[age]
  });

  document.getElementById('rpt-result').innerHTML = result;
  document.getElementById('rpt-result').classList.remove('empty');
  document.getElementById('rpt-result-actions').style.display = 'flex';
  document.getElementById('rpt-result-card').scrollIntoView({ behavior: 'smooth' });
}

function parseObservations(text) {
  // 按数字编号或换行分割
  const items = [];
  const lines = text.split(/[\n\r]+/).filter(l => l.trim());
  for (const line of lines) {
    const cleaned = line.replace(/^\d+[\.、)\s]+/, '').trim();
    if (cleaned) items.push(cleaned);
  }
  if (items.length === 0 && text.trim()) items.push(text.trim());
  return items;
}

function buildOverview(name, age, obsItems) {
  const count = obsItems.length;
  const ageLabel = ageLabels[age] || '';
  const combinedText = obsItems.join('');
  const kw = detectKeywords(combinedText);

  const focusedAreas = [];
  if (kw.includes('social_positive') || kw.includes('social_initiative')) focusedAreas.push('同伴交往');
  if (kw.includes('persistence') || kw.includes('concentration')) focusedAreas.push('学习品质');
  if (kw.includes('creativity')) focusedAreas.push('创造力');
  if (kw.includes('independence')) focusedAreas.push('自理能力');
  if (kw.includes('motor')) focusedAreas.push('运动发展');
  const areaText = focusedAreas.length > 0 ? `尤其在${focusedAreas.slice(0, 2).join('和')}方面表现出了令人印象深刻的进步。` : '在多个领域均展现出了令人欣喜的成长。';

  const variants = [
    `${name}在本学期中参与的各项活动，为我们勾勒出了一幅生动的成长图景。从日常观察到专项记录，我们看到了一种稳步向上的发展态势。${areaText}`,
    `回顾${name}这一学期的表现，可以用"稳步成长"来概括。在日常的点滴观察中，他/她逐渐展现出了${ageLabel}幼儿的发展活力。${areaText}`,
    `从学期初到学期末，${name}的变化是可感可触的。通过${count}次重点观察，我们记录下了他/她在幼儿园生活中的成长印记。${areaText}`,
  ];
  return pick(variants);
}

function buildDomainAnalysis(name, age, domain, obsItems) {

  const base = domainLib[domain] ? pick(domainLib[domain]) : `${name}在${domain}领域展现了符合年龄特点的发展水平。`;
  const specificPart = matchedObs.length > 0
    ? `本学期中，有一个片段尤为典型：${matchedObs[0].slice(0, 80)}……`
    : '';
  return `${base}${specificPart}`;
}

function buildHighlights(name, obsItems) {
  if (obsItems.length === 0) {
    return `<p>1. ${name}能够较好地适应幼儿园集体生活，情绪状态稳定。<br>2. 在各项活动中表现出了积极的参与态度。</p>`;
  }
  const maxH = Math.min(obsItems.length, 3);
  const prefixes = ['最令人印象深刻的是，', '另一个值得记录的瞬间是，', '我们还注意到，'];
  let result = '';
  for (let i = 0; i < maxH; i++) {
    result += `<p>${i + 1}. ${prefixes[i] || ''}${obsItems[i]}</p>`;
  }
  return result;
}

function buildImprovements(name, age, obsItems, domains, parentConcern) {
  const combined = obsItems.join('');
  const kw = detectKeywords(combined);
  const parts = [];
  parts.push(`<p>每个孩子都在成长的道路上，${name}也不例外。以下方面可以在下学期获得更多关注和支持：</p>`);

  const suggestionPool = {
    '健康': [`在身体活动方面，${name}可以尝试更多样的运动形式，丰富运动经验的同时提升身体协调性和耐力。`],
    '语言': [`建议在家中多进行睡前阅读和日常对话，鼓励${name}用完整的句子讲述一天中发生的事情，在轻松的氛围中自然提升语言表达能力。`],
    '社会': [`为${name}安排与不同性格同伴互动的机会，引导其在真实的社交场景中练习分享、轮流和协商。`],
    '科学': [`保护${name}的好奇心，多提供动手操作和观察自然的机会，用"你是怎么发现的？"替代直接给答案。`],
    '艺术': [`提供丰富且简单的艺术材料（纸张、彩笔、黏土），不以"像不像"评价作品，多聊"你做了什么"。`],
  };

  // Keyword-aware extra suggestions
  if (kw.includes('emotion_negative')) {
    parts.push(`<p>1. 帮助${name}建立情绪表达的"词汇库"（开心、生气、难过、害怕），引导其用语言而非行为表达内心感受。</p>`);
  }
  if (kw.includes('conflict')) {
    parts.push(`<p>2. 在出现同伴冲突时，先给予冷静时间，再引导双方描述各自看到的"事实"，帮助其建立换位思考的初步能力。</p>`);
  }

  let count = parts.filter(p => p.startsWith('<p>1.') || p.startsWith('<p>2.')).length;
  for (const d of domains) {
    if (suggestionPool[d] && count < 4) {
      count++;
      parts.push(`<p>${count}. ${suggestionPool[d][0]}</p>`);
    }
  }

  if (parentConcern && count < 4) {
    count++;
    parts.push(`<p>${count}. 关于您特别关注的"${parentConcern}"，我们建议在日常生活中持续观察和记录，与老师保持定期沟通，共同为孩子制定个性化的支持方案。</p>`);
  }

  return parts.join('\n');
}

function buildNextSteps(name, age, domains, parentConcern) {
  const combined = domains.join('、');
  const variants = [
    `<p>1. <strong>发展聚焦：</strong>继续巩固${name}的优势领域，同时在${combined}方面进行更深入的观察和针对性支持。</p>
     <p>2. <strong>家园共育：</strong>我们计划建立更紧密的家园沟通机制——不仅反馈在园表现，也积极了解在家情况，确保教育方法和期望的一致性。</p>
     <p>3. <strong>观察深化：</strong>下学期将采用更多元的观察方式（定点观察、作品分析、轶事记录），以更全面地把握${name}的发展脉络。</p>`,
    `<p>1. <strong>个性化发展：</strong>针对${name}的发展特点，制定更有针对性的个别化支持方案，尤其关注其${pick(domains)}领域的进一步提升。</p>
     <p>2. <strong>家庭配合：</strong>欢迎您随时与老师沟通在家观察到的变化和困惑。家校合力，效果加倍。</p>
     <p>3. <strong>持续跟踪：</strong>我们将保持至少每月一次的记录频率，为${name}建立更完整的成长档案。</p>`,
  ];
  return pick(variants);
}

function getPositiveTrait() {
  const traits = [
    '可贵的好奇心与求知欲', '温暖友善的交往品质', '坚持不懈的探究精神',
    '独特的创造力与想象力', '稳步提升的自理能力', '积极向上的成长态度'
  ];
  return traits[Math.floor(Math.random() * traits.length)];
}

// ============================================================
// 历史记录渲染
// ============================================================
async function renderHistory() {
  const records = await getRecords();
  const list = document.getElementById('history-list');
  const actions = document.getElementById('history-actions');

  if (records.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="icon">📭</span><p>还没有保存过记录</p><p style="font-size:0.85rem;">生成观察记录后点击"保存到历史"即可</p></div>`;
    actions.style.display = 'none';
    return;
  }

  actions.style.display = 'flex';
  list.innerHTML = records.map(r => `
    <div class="history-item">
      <div class="meta">
        <div class="name">${r.name} · ${r.age || ''}</div>
        <div class="info">${r.date} · ${r.scene} · ${r.type === 'observation' ? '观察记录' : '期末报告'}</div>
        <div class="preview">${r.what || '（无摘要）'}</div>
      </div>
      <div class="history-actions">
        <button class="btn btn-outline btn-sm" onclick="viewHistoryItem(${r.id})">查看</button>
        <button class="btn btn-outline btn-sm" onclick="loadToReport(${r.id})">导入报告</button>
        <button class="btn btn-outline btn-sm" style="color:var(--danger);" onclick="deleteHistoryItem(${r.id})">删除</button>
      </div>
    </div>
  `).join('');
}

async function viewHistoryItem(id) {
  const records = await getRecords();
  const r = records.find(rec => rec.id === id);
  if (!r) return;
  // 显示在模态风格的弹窗中
  const w = window.open('', '_blank', 'width=700,height=600');
  if (!w) {
    // fallback: 复制到剪贴板
    navigator.clipboard.writeText(r.result.replace(/<[^>]+>/g, '')).then(() => showToast('已复制到剪贴板'));
    return;
  }
  w.document.write(`
    <html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${r.name} - ${r.scene} - ${r.date}</title>
    <style>
      body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; padding: 30px; max-width: 700px; margin:0 auto; line-height:1.8; color:#3a3a3a; }
      h2,h3 { color:#c88b5d; }
    </style>
    </head><body>${r.result}</body></html>
  `);
}

async function loadToReport(id) {
  const records = await getRecords();
  const r = records.find(rec => rec.id === id);
  if (!r) return;
  // 将观察内容导入到报告表单
  const existing = document.getElementById('rpt-observations').value.trim();
  const newEntry = r.what ? `${r.date} ${r.scene}：${r.what}` : '';
  const merged = existing ? `${existing}\n${newEntry}` : newEntry;
  document.getElementById('rpt-observations').value = merged;
  // 同步姓名和年龄
  if (!document.getElementById('rpt-name').value) {
    document.getElementById('rpt-name').value = r.name;
  }
  if (!document.getElementById('rpt-age').value && r.ageValue) {
    document.getElementById('rpt-age').value = r.ageValue;
  }
  switchTab('report');
  showToast('已导入到报告表单');
}

async function deleteHistoryItem(id) {
  const records = await getRecords();
  const r = records.find(rec => rec.id === id);
  if (!confirm(`确定删除"${r?.name || ''}"的这条记录？`)) return;
  await deleteRecord(id);
  renderHistory();
  showToast('已删除');
}

// ============================================================
// 复制 & 下载
// ============================================================
function copyResult(resultId) {
  const el = document.getElementById(resultId);
  if (!el || el.classList.contains('empty')) return;
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'))
    .catch(() => showToast('复制失败，请手动选择'));
}

function downloadResult(resultId, filename) {
  const el = document.getElementById(resultId);
  if (!el || el.classList.contains('empty')) return;
  const content = el.innerHTML;
  const html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${filename}</title>
<style>
  body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; padding: 40px; max-width: 750px; margin:0 auto; line-height:2; color:#3a3a3a; font-size:15px; }
  h2,h3 { color:#c88b5d; margin-top:24px; }
  hr { border:none; border-top:1px dashed #e8ddd0; margin:16px 0; }
  .highlight { color:#7a9e7e; font-weight:500; }
</style>
</head>
<body>${content}</body>
</html>`;
  const blob = new Blob(['\uFEFF' + html], { type: 'application/msword;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename}-${document.getElementById(resultId === 'obs-result' ? 'obs-name' : 'rpt-name')?.value || ''}.doc`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('下载完成（可用Word打开）');
}

  // 初始化复选框样式
  document.querySelectorAll('.checkbox-item input:checked').forEach(cb => {
    cb.closest('.checkbox-item').classList.add('checked');
  });
})();
